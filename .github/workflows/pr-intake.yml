name: pr-intake

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set(['needs-review']);

            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
              labels.add('external-contribution');
            }

            const title = (pr.title || '').toLowerCase();
            if (title.includes('docs')) labels.add('area:docs');
            if (title.includes('cron') || title.includes('docker') || title.includes('deploy')) labels.add('area:ops');
            if (title.includes('chat') || title.includes('session') || title.includes('ui')) labels.add('area:product');

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labels],
            });

            const body = [
              'Thanks for the contribution — automated PR intake has run.',
              '',
              `- external contribution: ${pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}` ? 'yes' : 'no'}`,
              '- next step: maintainer review + validation',
              '',
              'For fastest merge, make sure the PR description includes:',
              '- summary',
              '- what changed',
              '- validation steps',
              '- risks or follow-ups',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
